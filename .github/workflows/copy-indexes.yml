name: Copy Indexes

on:
  workflow_run:
    workflows: ["Build TEI Indexes & Kaveri Map"]
    types:
      - completed

permissions:
  contents: write

jobs:
  copy-indexes:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Checkout site branch (where the site lives)
      - name: Checkout site branch
        uses: actions/checkout@v3
        with:
          ref: site
          fetch-depth: 0

      # 2. Fetch generated branch
      - name: Fetch generated branch
        run: git fetch origin generated

      # 3. Copy generated content into docs/indexes
      - name: Copy generated indexes
        run: |
          # Ensure docs/indexes exists
          mkdir -p docs/indexes

          # Remove old indexes but keep .gitignore
          find docs/indexes -type f ! -name ".gitignore" -delete

          # Add generated branch as temporary worktree
          git worktree add gen origin/generated

          # Copy all files except manuscripts.html
          rsync -av --exclude='manuscripts.html' gen/ docs/indexes/

          # Clean up temporary worktree
          rm -rf gen

      # 4. Commit and push changes (only if there are changes)
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/indexes
          git commit -m "Auto-copy indexes into docs/indexes (excluding manuscripts.html)" || echo "No changes to commit"
          git push origin site