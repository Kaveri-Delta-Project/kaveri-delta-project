name: Build TEI Indexes

on:
  push:
    paths:
      - 'data/**'
      - 'tei_index_build/*.py'
      - 'tei_index_build/static/**'

permissions:
  contents: write

jobs:
  build-indexes:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history (required for git diff)
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install lxml

      # 4. Detect which data directories changed
      - name: Detect changed data directories
        id: changes
        run: |
          echo "Checking which data directories changed..."
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} > changed_files.txt

          CHANGED_MANUSCRIPTS=false
          CHANGED_PERSONS=false
          CHANGED_PLACES=false
          CHANGED_WORKS=false

          if grep -q '^data/manuscripts/' changed_files.txt; then
            CHANGED_MANUSCRIPTS=true
          fi

          if grep -q '^data/persons/' changed_files.txt; then
            CHANGED_PERSONS=true
          fi

          if grep -q '^data/places/' changed_files.txt; then
            CHANGED_PLACES=true
          fi

          if grep -q '^data/works/' changed_files.txt; then
            CHANGED_WORKS=true
          fi

          echo "manuscripts=$CHANGED_MANUSCRIPTS" >> $GITHUB_OUTPUT
          echo "persons=$CHANGED_PERSONS" >> $GITHUB_OUTPUT
          echo "places=$CHANGED_PLACES" >> $GITHUB_OUTPUT
          echo "works=$CHANGED_WORKS" >> $GITHUB_OUTPUT

      # 5. Run index builders conditionally
      - name: Build manuscripts index
        if: steps.changes.outputs.manuscripts == 'true'
        run: python tei_index_build/build_ms_index.py

      - name: Build persons index
        if: steps.changes.outputs.persons == 'true'
        run: python tei_index_build/build_person_index.py

      - name: Build places index
        if: steps.changes.outputs.places == 'true'
        run: python tei_index_build/build_place_index.py

      - name: Build works index
        if: steps.changes.outputs.works == 'true'
        run: python tei_index_build/build_work_index.py

      # 6. Push generated HTML to separate branch
      - name: Push generated indexes to generated branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tei_index_build/build
          publish_branch: generated
          force_orphan: true
