name: Build TEI Indexes

on:
  push:
    paths:
      - 'data/**'
      - 'tei_index_build/*.py'
      - 'tei_index_build/static/**'

permissions:
  contents: write

jobs:
  build-indexes:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history (needed for gh-pages deploy)
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install lxml

      # 4. Build all indexes
      - name: Build TEI indexes
        run: python tei_index_build/build_indexes.py

      # 5. Push generated HTML to generated branch
      - name: Push generated indexes to generated branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tei_index_build/build
          publish_branch: generated
          force_orphan: true