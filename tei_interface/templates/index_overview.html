{% extends "base.html" %}

{% block title %}
  Index
{% endblock %}

{% block heading %}
  Index of Categories
{% endblock %}

{% block content %}
<ul class="home-list">
  {% for entity, items in all_entities.items() %}
    <li>
      <a href="{{ url_for('entity_index', entity=entity) }}" class="entity-link fw-semibold">
        {{ entity|capitalize }}
      </a>
      <span class="entity-count">({{ items|length }})</span>
    </li>
  {% endfor %}
</ul>
{% endblock %}
