<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'>
  <title>Inscription Index</title>
  <link rel='stylesheet' href='../static/css/index.css'>
   <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css' rel='stylesheet' integrity='sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65' crossorigin='anonymous'>
</head>
<body>
<div class='sticky-top bg-white border-bottom'>
<div class='index-header d-flex justify-content-between align-items-center'>
  <h1>Inscription Index</h1>
  <form id='index-search-form' class='d-flex mt-3 mt-md-0 index-search-form' onsubmit='return false;'>
    <div class='input-group input-group-sm search-group'>
      <input type='text' id='index-search' class='search-input form-control' placeholder='Search by name, diacritics ignored..' autocomplete='off'>
      <button type='button' id='search-clear' class='btn btn-secondary search-button'>Clear</button>
    </div>
  </form>
</div>
  <div class='alphabet mb-3 d-flex flex-wrap gap-2' id='alphabet-nav'>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='A'>A</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='B'>B</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='C'>C</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='D'>D</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='E'>E</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='F'>F</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='G'>G</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='H'>H</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='I'>I</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='J'>J</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='K'>K</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='L'>L</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='M'>M</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='N'>N</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='O'>O</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='P'>P</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='Q'>Q</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='R'>R</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='S'>S</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='T'>T</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='U'>U</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='V'>V</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='W'>W</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='X'>X</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='Y'>Y</button>
    <button class='btn btn-sm btn-outline-secondary alphabet-btn' data-letter='Z'>Z</button>
   <button type='button' class='btn btn-sm btn-outline-primary show-all alphabet-btn' data-letter='all'>Show All</button>
  </div>
</div>
  <main>
<ul class='index-list list-unstyled' id='all-entries'>
<li class='letter-entry' data-letter='A'><div class='index-entry' id='isc_1'>
<div class='entry-header'>
<span class='entry-title'>a test inscription file</span>
<span class='entry-id'>(isc_1)</span>
  <button class='toggle' aria-label='Show details'>▸</button>
</div>
<div class='item-details'>
</div></li>
</ul>
  </main>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js' integrity='sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4' crossorigin='anonymous'></script>
  <script src='../static/js/index.js'></script>
</body>
</html>
